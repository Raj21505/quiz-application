services:
  postgres:
    image: postgres:15
    container_name: quiz_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: quiz_backend
    restart: unless-stopped
    volumes:
      - ${FIREBASE_CREDENTIALS_HOST_PATH:-../secrets/firebase-service-account.json}:/run/secrets/firebase_credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-/run/secrets/firebase_credentials.json}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_DB_URL: ${FIREBASE_DB_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: quiz_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BASE: ${API_BASE:-http://backend:8000}
      FIREBASE_WEB_API_KEY: ${FIREBASE_WEB_API_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "${FRONTEND_PORT:-8501}:8501"

volumes:
  postgres_data:
